server {
    server_name _;
    listen 80 default_server;
    listen [::]:80 default_server;

    include /etc/nginx/conf.d/snippets/acme.conf;

    location / {
        return 301 http://martinjanu.eu/$request_uri;
    }
}

server {
    server_name         martinjanu.eu www.martinjanu.eu;
    listen              80;
    listen              [::]:80;
    listen              443 ssl;
    listen              [::]:443 ssl;
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    include /etc/nginx/conf.d/snippets/acme.conf;

    location / {
        root /www/static/;
    }

    location /rng/ {
        proxy_pass http://rng:8080/;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-Port $remote_port;
    }
}

server {
    server_name		upgreat.martinjanu.eu;
    listen              80;
    listen              [::]:80;
    listen              443 ssl;
    listen              [::]:443 ssl;
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    include /etc/nginx/conf.d/snippets/acme.conf;

    location /auth/ {
        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }
        return 403;
    }

    location / {
        return 418;  # Coffee maker under construction
    }
}
