services:
  webserver:
    &webserver-common
    image: nginx:stable
    ports:
      - 8080:80
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/cache:/var/cache/nginx:rw
      - ./nginx/pid:/var/run:rw
      - ./nginx/static:/www/static:ro
      - acme-challenge:/www/acme:ro
    profiles: ["dev"]
  webserver-prod:
    <<: *webserver-common
    restart: always
    profiles: ["prod"]
  rng:
    build:
      dockerfile: dockerfile
      context: rng
    restart: always
  acme:
    image: neilpang/acme.sh
    volumes:
      - acme-workdir:/acme.sh:rw
      - acme-challenge:/var/www/acme:rw
    environment:
      - TZ=UTC
    command: daemon
    restart: always
    profiles: ["prod"]

volumes:
  acme-workdir:
  acme-challenge:
