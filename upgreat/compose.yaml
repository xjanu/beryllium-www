services:

  db:
    image: postgres
    restart: always
    shm_size: 256mb
    volumes:
      - db-data:/var/lib/postgresql
    env_file: ".env"
    ports:
      - 5432:5432

  backend:
    build:
      dockerfile: dockerfile
      context: .
    restart: always
    ports:
      - 8081:8081
    profiles: ["prod"]

volumes:
  db-data:
