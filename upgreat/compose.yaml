services:

  upgreat-db:
    image: postgres
    restart: always
    shm_size: 256mb
    volumes:
      - db-data:/var/lib/postgresql
    env_file: ".env"
    ports:
      - 5432:5432

  upgreat-backend:
    build:
      dockerfile: dockerfile
      context: .
    restart: always
    ports:
      - 8081:8081

volumes:
  db-data:
